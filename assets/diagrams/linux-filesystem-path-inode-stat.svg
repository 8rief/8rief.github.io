<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">路径、目录项和 inode 模型</title>
  <desc id="desc">路径逐段解析到目录项，目录项指向 inode，stat 读取 inode 元数据。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/></marker></defs>
  <rect x="20" y="20" width="880" height="320" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="70" y="90" width="190" height="110" rx="14" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="165" y="125" text-anchor="middle" font-size="20" font-family="Arial">路径名</text>
  <text x="165" y="158" text-anchor="middle" font-size="16" font-family="Arial">workspace/files/alpha.txt</text>
  <rect x="360" y="90" width="190" height="110" rx="14" fill="#dcfce7" stroke="#22c55e"/>
  <text x="455" y="125" text-anchor="middle" font-size="20" font-family="Arial">目录项</text>
  <text x="455" y="158" text-anchor="middle" font-size="16" font-family="Arial">alpha.txt → inode</text>
  <rect x="650" y="70" width="210" height="150" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="755" y="105" text-anchor="middle" font-size="20" font-family="Arial">inode 元数据</text>
  <text x="755" y="138" text-anchor="middle" font-size="15" font-family="Arial">type / mode / uid / gid</text>
  <text x="755" y="163" text-anchor="middle" font-size="15" font-family="Arial">size / nlink / timestamps</text>
  <line x1="260" y1="145" x2="350" y2="145" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="550" y1="145" x2="640" y2="145" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="455" y="270" text-anchor="middle" font-size="17" font-family="Arial" fill="#334155">ls 遍历目录；stat 展开 inode；find 沿目录树枚举路径</text>
</svg>
