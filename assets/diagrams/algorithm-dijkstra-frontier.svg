<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Dijkstra priority queue frontier</title>
  <desc id="desc">Dijkstra repeatedly pops the smallest tentative distance from a priority queue, settles it, relaxes outgoing edges, and skips stale heap entries.</desc>
  <defs><style>text { font-family: Arial, 'Microsoft YaHei', sans-serif; fill: #172033; }.settled { fill: #e6f4ea; stroke: #188038; stroke-width: 3; }.frontier { fill: #e8f0fe; stroke: #1a73e8; stroke-width: 3; }.unseen { fill: #f6f8fb; stroke: #6b7280; stroke-width: 2; }.heap { fill: #fff8e8; stroke: #b7791f; stroke-width: 2; rx: 16; }.edge { stroke: #44546a; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }.dash { stroke-dasharray: 7 5; }.title { font-size: 22px; font-weight: 700; }.small { font-size: 17px; }</style><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M 0 0 L 12 6 L 0 12 z" fill="#44546a" /></marker></defs>
  <text x="490" y="40" text-anchor="middle" class="title">Dijkstra：优先队列维护当前最短候选</text>
  <circle cx="150" cy="170" r="34" class="settled" /><text x="150" y="177" text-anchor="middle">0</text><circle cx="300" cy="110" r="34" class="settled" /><text x="300" y="117" text-anchor="middle">2</text><circle cx="300" cy="245" r="34" class="frontier" /><text x="300" y="252" text-anchor="middle">1</text><circle cx="470" cy="95" r="34" class="frontier" /><text x="470" y="102" text-anchor="middle">5</text><circle cx="500" cy="255" r="34" class="unseen" /><text x="500" y="262" text-anchor="middle">3</text><circle cx="660" cy="175" r="34" class="unseen" /><text x="660" y="182" text-anchor="middle">4</text>
  <path d="M 181 157 L 267 122" class="edge" /><text x="220" y="126" class="small">9</text><path d="M 178 184 L 267 232" class="edge" /><text x="220" y="224" class="small">7</text><path d="M 332 108 L 436 98" class="edge" /><text x="382" y="88" class="small">2</text><path d="M 327 257 L 466 256" class="edge dash" /><text x="390" y="246" class="small">15</text><path d="M 499 110 L 632 160" class="edge" /><text x="565" y="130" class="small">9</text><path d="M 531 241 L 632 188" class="edge dash" /><text x="578" y="226" class="small">6</text>
  <rect x="735" y="90" width="200" height="210" class="heap" /><text x="835" y="130" text-anchor="middle" class="title">min-heap</text><text x="835" y="170" text-anchor="middle" class="small">(7, 1)</text><text x="835" y="200" text-anchor="middle" class="small">(11, 5)</text><text x="835" y="230" text-anchor="middle" class="small">(20, 3)</text><text x="835" y="260" text-anchor="middle" class="small">旧记录会被跳过</text>
  <text x="150" y="360" text-anchor="middle" class="small">已确定最短距离</text><text x="300" y="360" text-anchor="middle" class="small">候选边界</text><text x="520" y="360" text-anchor="middle" class="small">尚未最终确定</text><text x="490" y="395" text-anchor="middle" class="small">前提：所有边权非负。弹出的最小候选距离不会再被后续路径改小。</text>
</svg>
