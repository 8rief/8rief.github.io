<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="390" viewBox="0 0 1080 390" role="img" aria-labelledby="title desc">
  <title id="title">C++ header, source and linker relationship</title>
  <desc id="desc">The header provides declarations to both translation units. main.cpp compiles to main.o with undefined references. math_utils.cpp compiles to math_utils.o with definitions. The linker resolves references into an executable. A bad header-only definition can create the same strong symbol in multiple object files and fail with multiple definition.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 10; }
      .good { fill: #ecfdf5; stroke: #059669; stroke-width: 1.6; rx: 10; }
      .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.6; rx: 10; }
      .bad { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.6; rx: 10; }
      .text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; font-size: 15px; fill: #0f172a; }
      .small { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; font-size: 12px; fill: #475569; }
      .cmd { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.2; fill: none; stroke-dasharray: 5 4; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="30" y="32" class="text">正确路径：声明进入编译器，定义进入链接器</text>

  <rect x="40" y="65" width="165" height="70" class="box" />
  <text x="122" y="92" text-anchor="middle" class="cmd">math_utils.hpp</text>
  <text x="122" y="116" text-anchor="middle" class="small">声明：add / multiply</text>

  <rect x="285" y="40" width="155" height="70" class="box" />
  <text x="362" y="68" text-anchor="middle" class="cmd">main.cpp</text>
  <text x="362" y="92" text-anchor="middle" class="small">调用函数</text>

  <rect x="285" y="135" width="155" height="70" class="box" />
  <text x="362" y="163" text-anchor="middle" class="cmd">math_utils.cpp</text>
  <text x="362" y="187" text-anchor="middle" class="small">提供函数体</text>

  <line x1="205" y1="92" x2="285" y2="72" class="dash" />
  <line x1="205" y1="108" x2="285" y2="168" class="dash" />
  <text x="235" y="55" class="small">#include</text>

  <rect x="520" y="40" width="175" height="70" class="warn" />
  <text x="607" y="66" text-anchor="middle" class="cmd">main.o</text>
  <text x="607" y="90" text-anchor="middle" class="small">T main</text>
  <text x="607" y="106" text-anchor="middle" class="small">U add / multiply</text>

  <rect x="520" y="135" width="175" height="70" class="good" />
  <text x="607" y="161" text-anchor="middle" class="cmd">math_utils.o</text>
  <text x="607" y="185" text-anchor="middle" class="small">T add / multiply</text>

  <line x1="440" y1="75" x2="520" y2="75" class="arrow" />
  <line x1="440" y1="170" x2="520" y2="170" class="arrow" />
  <text x="468" y="61" class="cmd">-c</text>
  <text x="468" y="156" class="cmd">-c</text>

  <rect x="770" y="82" width="135" height="80" class="box" />
  <text x="837" y="112" text-anchor="middle" class="text">linker</text>
  <text x="837" y="137" text-anchor="middle" class="small">解析 U → T</text>

  <line x1="695" y1="75" x2="770" y2="112" class="arrow" />
  <line x1="695" y1="170" x2="770" y2="135" class="arrow" />

  <rect x="950" y="82" width="105" height="80" class="good" />
  <text x="1002" y="112" text-anchor="middle" class="cmd">math_app</text>
  <text x="1002" y="137" text-anchor="middle" class="small">可执行文件</text>
  <line x1="905" y1="122" x2="950" y2="122" class="arrow" />

  <text x="30" y="250" class="text">错误路径：把普通函数定义写进头文件会制造多个强定义</text>
  <rect x="40" y="280" width="170" height="70" class="bad" />
  <text x="125" y="307" text-anchor="middle" class="cmd">bad_math.hpp</text>
  <text x="125" y="331" text-anchor="middle" class="small">函数体：bad_add</text>

  <rect x="285" y="255" width="150" height="55" class="box" />
  <text x="360" y="287" text-anchor="middle" class="cmd">use_bad_a.cpp</text>
  <rect x="285" y="325" width="150" height="55" class="box" />
  <text x="360" y="357" text-anchor="middle" class="cmd">use_bad_b.cpp</text>

  <line x1="210" y1="308" x2="285" y2="282" class="dash" />
  <line x1="210" y1="322" x2="285" y2="352" class="dash" />

  <rect x="515" y="255" width="165" height="55" class="bad" />
  <text x="597" y="279" text-anchor="middle" class="cmd">use_bad_a.o</text>
  <text x="597" y="297" text-anchor="middle" class="small">T bad_add</text>
  <rect x="515" y="325" width="165" height="55" class="bad" />
  <text x="597" y="349" text-anchor="middle" class="cmd">use_bad_b.o</text>
  <text x="597" y="367" text-anchor="middle" class="small">T bad_add</text>

  <line x1="435" y1="282" x2="515" y2="282" class="arrow" />
  <line x1="435" y1="352" x2="515" y2="352" class="arrow" />

  <rect x="770" y="290" width="160" height="70" class="bad" />
  <text x="850" y="317" text-anchor="middle" class="text">linker error</text>
  <text x="850" y="341" text-anchor="middle" class="small">multiple definition</text>
  <line x1="680" y1="282" x2="770" y2="315" class="arrow" />
  <line x1="680" y1="352" x2="770" y2="335" class="arrow" />
</svg>
