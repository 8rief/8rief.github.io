<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Git working tree、index、commit 模型</title>
  <desc id="desc">文件从 working tree 进入 index，再通过 commit 保存到 repository。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/></marker></defs>
  <rect x="20" y="20" width="880" height="320" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="70" y="95" width="180" height="110" rx="14" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="160" y="132" text-anchor="middle" font-size="20" font-family="Arial">working tree</text><text x="160" y="162" text-anchor="middle" font-size="15" font-family="Arial">正在编辑的文件</text>
  <rect x="370" y="95" width="180" height="110" rx="14" fill="#dcfce7" stroke="#22c55e"/>
  <text x="460" y="132" text-anchor="middle" font-size="20" font-family="Arial">index</text><text x="460" y="162" text-anchor="middle" font-size="15" font-family="Arial">下一次提交内容</text>
  <rect x="670" y="95" width="180" height="110" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="760" y="132" text-anchor="middle" font-size="20" font-family="Arial">commit</text><text x="760" y="162" text-anchor="middle" font-size="15" font-family="Arial">项目快照</text>
  <line x1="250" y1="150" x2="360" y2="150" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/><text x="305" y="132" text-anchor="middle" font-size="15" font-family="Arial">git add</text>
  <line x1="550" y1="150" x2="660" y2="150" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/><text x="605" y="132" text-anchor="middle" font-size="15" font-family="Arial">git commit</text>
  <text x="460" y="285" text-anchor="middle" font-size="17" font-family="Arial" fill="#334155">status 说明路径位于哪一层；diff 说明层与层之间的变化</text>
</svg>
