<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">退出码、信号和 wait 模型</title>
  <desc id="desc">父进程启动子进程，子进程正常 exit 或被 signal 终止，父进程 wait 读取状态。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/></marker></defs>
  <rect x="20" y="20" width="880" height="320" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="90" y="95" width="190" height="110" rx="16" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="185" y="132" text-anchor="middle" font-size="20" font-family="Arial">父 shell</text>
  <text x="185" y="162" text-anchor="middle" font-size="16" font-family="Arial">$! / wait / $?</text>
  <rect x="380" y="95" width="190" height="110" rx="16" fill="#dcfce7" stroke="#22c55e"/>
  <text x="475" y="132" text-anchor="middle" font-size="20" font-family="Arial">子进程</text>
  <text x="475" y="162" text-anchor="middle" font-size="16" font-family="Arial">exit(code)</text>
  <rect x="670" y="95" width="170" height="110" rx="16" fill="#fee2e2" stroke="#ef4444"/>
  <text x="755" y="132" text-anchor="middle" font-size="20" font-family="Arial">信号</text>
  <text x="755" y="162" text-anchor="middle" font-size="16" font-family="Arial">TERM / INT</text>
  <line x1="280" y1="150" x2="370" y2="150" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="670" y1="150" x2="580" y2="150" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M380 218 C310 270,230 270,185 210" fill="none" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="460" y="295" text-anchor="middle" font-size="17" font-family="Arial" fill="#334155">正常退出返回 code；信号终止常在 shell 中表现为 128 + signal number</text>
</svg>
