<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-label="DNS 解析、TCP 连接与 HTTP Host 头">
  <rect width="920" height="260" fill="#f8fafc"/>
  <defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/></marker></defs>
  <rect x="40" y="70" width="170" height="90" rx="14" fill="#dbeafe" stroke="#2563eb"/><text x="125" y="105" text-anchor="middle" font-size="18" font-family="sans-serif" fill="#1e3a8a">curl</text><text x="125" y="132" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#1e3a8a">URL: lab.local:18183</text>
  <rect x="280" y="40" width="180" height="70" rx="14" fill="#ecfeff" stroke="#0891b2"/><text x="370" y="70" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#164e63">名称解析</text><text x="370" y="92" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#164e63">lab.local → 127.0.0.1</text>
  <rect x="280" y="150" width="180" height="70" rx="14" fill="#fef3c7" stroke="#d97706"/><text x="370" y="180" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#78350f">HTTP Host</text><text x="370" y="202" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#78350f">Host: lab.local:18183</text>
  <rect x="570" y="70" width="260" height="90" rx="14" fill="#dcfce7" stroke="#16a34a"/><text x="700" y="103" text-anchor="middle" font-size="18" font-family="sans-serif" fill="#14532d">本地服务</text><text x="700" y="130" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#14532d">listen 127.0.0.1:18183</text>
  <line x1="210" y1="105" x2="280" y2="75" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/><line x1="460" y1="75" x2="570" y2="105" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/><line x1="210" y1="130" x2="280" y2="185" stroke="#d97706" stroke-width="3" marker-end="url(#a)"/><line x1="460" y1="185" x2="570" y2="130" stroke="#d97706" stroke-width="3" marker-end="url(#a)"/>
  <text x="505" y="38" font-size="12" font-family="sans-serif" fill="#475569">连接目标由解析结果决定</text><text x="505" y="232" font-size="12" font-family="sans-serif" fill="#475569">应用路由常读取 Host 头</text>
</svg>
