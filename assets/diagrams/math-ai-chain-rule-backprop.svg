<svg xmlns="http://www.w3.org/2000/svg" width="920" height="230" viewBox="0 0 920 230" role="img" aria-labelledby="title desc">
<title>链式法则到反向传播：一层 tanh 网络怎么传回梯度</title>
<desc>输入 x -&gt; z=Wx+b -&gt; h=tanh(z) -&gt; loss -&gt; dL/dW 反传</desc>
<rect x="0" y="0" width="920" height="230" fill="#ffffff"/>
<text x="40" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#202124">链式法则到反向传播：一层 tanh 网络怎么传回梯度</text>
<rect x="40" y="112" width="150" height="62" rx="14" fill="#e8f0fe" stroke="#5f6368" stroke-width="1.2"/>
<text x="115.0" y="140" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" fill="#202124">输入 x</text>
<line x1="196" y1="143.0" x2="210" y2="143.0" stroke="#5f6368" stroke-width="2"/>
<path d="M 210 143.0 L 202 138.0 L 202 148.0 Z" fill="#5f6368"/>
<rect x="218" y="112" width="150" height="62" rx="14" fill="#e6f4ea" stroke="#5f6368" stroke-width="1.2"/>
<text x="293.0" y="140" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" fill="#202124">z=Wx+b</text>
<line x1="374" y1="143.0" x2="388" y2="143.0" stroke="#5f6368" stroke-width="2"/>
<path d="M 388 143.0 L 380 138.0 L 380 148.0 Z" fill="#5f6368"/>
<rect x="396" y="112" width="150" height="62" rx="14" fill="#fef7e0" stroke="#5f6368" stroke-width="1.2"/>
<text x="471.0" y="140" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" fill="#202124">h=tanh(z)</text>
<line x1="552" y1="143.0" x2="566" y2="143.0" stroke="#5f6368" stroke-width="2"/>
<path d="M 566 143.0 L 558 138.0 L 558 148.0 Z" fill="#5f6368"/>
<rect x="574" y="112" width="150" height="62" rx="14" fill="#fce8e6" stroke="#5f6368" stroke-width="1.2"/>
<text x="649.0" y="140" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" fill="#202124">loss</text>
<line x1="730" y1="143.0" x2="744" y2="143.0" stroke="#5f6368" stroke-width="2"/>
<path d="M 744 143.0 L 736 138.0 L 736 148.0 Z" fill="#5f6368"/>
<rect x="752" y="112" width="150" height="62" rx="14" fill="#f3e8fd" stroke="#5f6368" stroke-width="1.2"/>
<text x="827.0" y="140" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" fill="#202124">dL/dW 反传</text>
<text x="40" y="205" font-family="Arial, sans-serif" font-size="13" fill="#5f6368">A demand-driven map from mathematical object to verified computation.</text>
</svg>
