<svg xmlns="http://www.w3.org/2000/svg" width="920" height="380" viewBox="0 0 920 380" role="img" aria-labelledby="title desc">
  <title id="title">system observer 结课项目结构</title>
  <desc id="desc">workspace 输入经过 collector 和 reporter，生成 Markdown、JSON、transcript 和测试证据。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/></marker></defs>
  <rect x="20" y="20" width="880" height="340" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="70" y="110" width="170" height="100" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="155" y="145" text-anchor="middle" font-size="20" font-family="Arial">workspace</text>
  <text x="155" y="174" text-anchor="middle" font-size="15" font-family="Arial">files / logs</text>
  <rect x="310" y="80" width="210" height="160" rx="14" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="415" y="116" text-anchor="middle" font-size="20" font-family="Arial">collector</text>
  <text x="415" y="148" text-anchor="middle" font-size="15" font-family="Arial">stat / fd / proc</text>
  <text x="415" y="173" text-anchor="middle" font-size="15" font-family="Arial">env / umask / signal</text>
  <text x="415" y="198" text-anchor="middle" font-size="15" font-family="Arial">pipeline</text>
  <rect x="600" y="80" width="230" height="160" rx="14" fill="#dcfce7" stroke="#22c55e"/>
  <text x="715" y="116" text-anchor="middle" font-size="20" font-family="Arial">reports</text>
  <text x="715" y="148" text-anchor="middle" font-size="15" font-family="Arial">Markdown</text>
  <text x="715" y="173" text-anchor="middle" font-size="15" font-family="Arial">observations.json</text>
  <text x="715" y="198" text-anchor="middle" font-size="15" font-family="Arial">transcript + unittest</text>
  <line x1="240" y1="160" x2="300" y2="160" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="520" y1="160" x2="590" y2="160" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="460" y="305" text-anchor="middle" font-size="17" font-family="Arial" fill="#334155">受控输入 → 本地观察 → 人读报告与机器证据 → 可复跑验证</text>
</svg>
