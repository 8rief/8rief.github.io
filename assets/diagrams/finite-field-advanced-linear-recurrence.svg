<svg xmlns="http://www.w3.org/2000/svg" width="940" height="360" viewBox="0 0 940 360">
  <rect width="940" height="360" fill="#f8fafc"/>
  <text x="42" y="54" font-size="28" font-weight="700" style="font-family: Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;">线性递推：状态在有限域里循环</text>
  <g fill="#e0f2fe" stroke="#0284c7" stroke-width="2" style="font-family: Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;" font-size="18" text-anchor="middle">
    <rect x="90" y="130" width="120" height="60" rx="12"/><text x="150" y="166">状态 1</text>
    <rect x="270" y="130" width="120" height="60" rx="12"/><text x="330" y="166">状态 2</text>
    <rect x="450" y="130" width="120" height="60" rx="12"/><text x="510" y="166">状态 3</text>
    <rect x="630" y="130" width="120" height="60" rx="12"/><text x="690" y="166">...</text>
  </g>
  <path d="M215 160 H260" stroke="#334155" stroke-width="3" marker-end="url(#a)"/>
  <path d="M395 160 H440" stroke="#334155" stroke-width="3" marker-end="url(#a)"/>
  <path d="M575 160 H620" stroke="#334155" stroke-width="3" marker-end="url(#a)"/>
  <path d="M750 160 C850 160 850 80 150 92" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#a)"/>
  <rect x="160" y="250" width="620" height="58" rx="16" fill="#fff" stroke="#94a3b8"/>
  <text x="205" y="285" font-size="18" style="font-family: Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;">本原特征多项式使所有非零状态形成长度 q^m-1 的大循环</text>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
</svg>