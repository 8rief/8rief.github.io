<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
<title id="title">Tensor 形状和 broadcasting</title>
<desc id="desc">Tensor 形状和 broadcasting 的结构示意图。</desc>
<rect width="920" height="420" fill="#f8fafc"/>
<text x="40" y="42" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">Tensor 形状和 broadcasting</text>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
<line x1="200" y1="145.0" x2="440" y2="145.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="380" y1="145.0" x2="440" y2="145.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="320" y1="285.0" x2="390" y2="285.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="530" y1="285.0" x2="600" y2="285.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="80" y="110" width="120" height="70" rx="14" fill="#dbeafe" stroke="#334155" stroke-width="1.5"/>
<text x="140.0" y="135.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">x</text>
<text x="140.0" y="157.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">3 × 4</text>
<rect x="260" y="110" width="120" height="70" rx="14" fill="#dcfce7" stroke="#334155" stroke-width="1.5"/>
<text x="320.0" y="135.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">scale</text>
<text x="320.0" y="157.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">4</text>
<rect x="440" y="110" width="140" height="70" rx="14" fill="#ffedd5" stroke="#334155" stroke-width="1.5"/>
<text x="510.0" y="135.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">broadcast</text>
<text x="510.0" y="157.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">3 × 4</text>
<rect x="170" y="250" width="150" height="70" rx="14" fill="#ede9fe" stroke="#334155" stroke-width="1.5"/>
<text x="245.0" y="275.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">batch</text>
<text x="245.0" y="297.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">2 × 3 × 4</text>
<rect x="390" y="250" width="140" height="70" rx="14" fill="#e2e8f0" stroke="#334155" stroke-width="1.5"/>
<text x="460.0" y="275.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">weights</text>
<text x="460.0" y="297.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">4 × 2</text>
<rect x="600" y="250" width="150" height="70" rx="14" fill="#fee2e2" stroke="#334155" stroke-width="1.5"/>
<text x="675.0" y="275.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">logits</text>
<text x="675.0" y="297.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">2 × 3 × 2</text>
</svg>