<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
<title id="title">事务的真实用途：订单写入和库存扣减必须一起成功</title>
<desc id="desc">Begin transaction -&gt; Insert order -&gt; Check stock -&gt; Update stock + items -&gt; Commit or rollback</desc>
<rect width="100%" height="100%" fill="#f8fafc"/>
<style>text{font-family:Arial,&quot;Microsoft YaHei&quot;,sans-serif}.title{font-size:24px;font-weight:700;fill:#0f172a}.node{fill:#ffffff;stroke:#2563eb;stroke-width:2}.label{font-size:14px;fill:#0f172a;font-weight:600}.arrow{stroke:#64748b;stroke-width:2;marker-end:url(#arrow)}.note{font-size:13px;fill:#475569}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
<text class="title" x="30" y="42">事务的真实用途：订单写入和库存扣减必须一起成功</text>
<rect class="node" x="30" y="110" width="150" height="70" rx="14"/>
<text class="label" x="105.0" y="142" text-anchor="middle">Begin transaction</text>
<line class="arrow" x1="184" y1="145.0" x2="202" y2="145.0"/>
<rect class="node" x="208" y="110" width="150" height="70" rx="14"/>
<text class="label" x="283.0" y="142" text-anchor="middle">Insert order</text>
<line class="arrow" x1="362" y1="145.0" x2="380" y2="145.0"/>
<rect class="node" x="386" y="110" width="150" height="70" rx="14"/>
<text class="label" x="461.0" y="142" text-anchor="middle">Check stock</text>
<line class="arrow" x1="540" y1="145.0" x2="558" y2="145.0"/>
<rect class="node" x="564" y="110" width="150" height="70" rx="14"/>
<text class="label" x="639.0" y="133" text-anchor="middle">Update stock</text>
<text class="label" x="639.0" y="151" text-anchor="middle">+ items</text>
<line class="arrow" x1="718" y1="145.0" x2="736" y2="145.0"/>
<rect class="node" x="742" y="110" width="150" height="70" rx="14"/>
<text class="label" x="817.0" y="142" text-anchor="middle">Commit or rollback</text>
<text class="note" x="30" y="260">Source: local reproducible lab; concepts cross-checked against Python sqlite3, SQLite, and Redis documentation.</text>
</svg>
