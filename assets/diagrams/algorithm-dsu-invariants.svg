<svg xmlns="http://www.w3.org/2000/svg" width="980" height="410" viewBox="0 0 980 410" role="img" aria-labelledby="title desc">
  <title id="title">Disjoint set union invariants</title>
  <desc id="desc">Disjoint set union stores each component as a tree, where roots point to themselves and root size records component size.</desc>
  <defs><style>text { font-family: Arial, 'Microsoft YaHei', sans-serif; fill: #172033; }.node { fill: #f6f8fb; stroke: #315c9f; stroke-width: 2; }.root { fill: #edf8f0; stroke: #2f855a; stroke-width: 3; }.arrow { stroke: #44546a; stroke-width: 2.4; marker-end: url(#arrow); fill: none; }.hint { font-size: 17px; }.title { font-size: 22px; font-weight: 700; }</style><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M 0 0 L 12 6 L 0 12 z" fill="#44546a" /></marker></defs>
  <text x="490" y="40" text-anchor="middle" class="title">并查集：森林、根节点和组件大小</text>
  <circle cx="180" cy="120" r="28" class="root" /><text x="180" y="127" text-anchor="middle">0</text><circle cx="115" cy="215" r="28" class="node" /><text x="115" y="222" text-anchor="middle">1</text><circle cx="245" cy="215" r="28" class="node" /><text x="245" y="222" text-anchor="middle">2</text><circle cx="245" cy="300" r="28" class="node" /><text x="245" y="307" text-anchor="middle">3</text><path d="M 128 196 L 165 143" class="arrow" /><path d="M 232 196 L 195 143" class="arrow" /><path d="M 245 272 L 245 243" class="arrow" /><text x="180" y="360" text-anchor="middle" class="hint">组件 A：root=0，size[0]=4</text>
  <circle cx="550" cy="120" r="28" class="root" /><text x="550" y="127" text-anchor="middle">5</text><circle cx="490" cy="215" r="28" class="node" /><text x="490" y="222" text-anchor="middle">6</text><circle cx="610" cy="215" r="28" class="node" /><text x="610" y="222" text-anchor="middle">7</text><path d="M 503 196 L 535 143" class="arrow" /><path d="M 597 196 L 565 143" class="arrow" /><text x="550" y="285" text-anchor="middle" class="hint">组件 B：root=5，size[5]=3</text>
  <rect x="735" y="95" width="190" height="205" rx="16" fill="#fff8e8" stroke="#b7791f" stroke-width="2" /><text x="830" y="135" text-anchor="middle" class="title">两个优化</text><text x="830" y="178" text-anchor="middle" class="hint">union by size</text><text x="830" y="207" text-anchor="middle" class="hint">小树挂到大树根</text><text x="830" y="250" text-anchor="middle" class="hint">path compression</text><text x="830" y="279" text-anchor="middle" class="hint">find 后直连根</text>
</svg>
