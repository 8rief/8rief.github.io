<svg xmlns="http://www.w3.org/2000/svg" width="940" height="300" viewBox="0 0 940 300" role="img" aria-labelledby="title desc">
<title id="title">容器数据怎么留下来：bind mount、volume 和访问计数持久化</title>
<desc id="desc">Container writes /data -&gt; Bind mount -&gt; Host state.json -&gt; Restart container -&gt; Visits still exist</desc>
<rect width="100%" height="100%" fill="#f8fafc"/>
<style>text{font-family:Arial,&quot;Microsoft YaHei&quot;,sans-serif}.title{font-size:24px;font-weight:700;fill:#0f172a}.node{fill:#ffffff;stroke:#0891b2;stroke-width:2}.label{font-size:14px;fill:#0f172a;font-weight:700}.arrow{stroke:#64748b;stroke-width:2;marker-end:url(#arrow)}.note{font-size:13px;fill:#475569}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
<text class="title" x="30" y="42">容器数据怎么留下来：bind mount、volume 和访问计数持久化</text>
