<line class="arrow" x1="184" y1="147.0" x2="198" y2="147.0"/>
<rect class="node" x="204" y="112" width="150" height="70" rx="14"/>
<text class="label" x="279.0" y="144" text-anchor="middle">Bind mount</text>
<line class="arrow" x1="358" y1="147.0" x2="372" y2="147.0"/>
<rect class="node" x="378" y="112" width="150" height="70" rx="14"/>
<text class="label" x="453.0" y="144" text-anchor="middle">Host state.json</text>
<line class="arrow" x1="532" y1="147.0" x2="546" y2="147.0"/>
