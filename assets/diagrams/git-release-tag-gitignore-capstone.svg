<svg xmlns="http://www.w3.org/2000/svg" width="920" height="380" viewBox="0 0 920 380" role="img" aria-labelledby="title desc">
  <title id="title">Git 结课 repo lab 结构</title>
  <desc id="desc">project、remote.git 和 colleague 三个本地仓库生成报告、JSON 和 transcript。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f766e"/></marker></defs>
  <rect x="20" y="20" width="880" height="340" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="70" y="90" width="180" height="115" rx="14" fill="#dbeafe" stroke="#60a5fa"/><text x="160" y="128" text-anchor="middle" font-size="20" font-family="Arial">project</text><text x="160" y="158" text-anchor="middle" font-size="15" font-family="Arial">objects / refs</text><text x="160" y="182" text-anchor="middle" font-size="15" font-family="Arial">tag v0.1.0</text>
  <rect x="370" y="90" width="180" height="115" rx="14" fill="#fef3c7" stroke="#f59e0b"/><text x="460" y="128" text-anchor="middle" font-size="20" font-family="Arial">remote.git</text><text x="460" y="158" text-anchor="middle" font-size="15" font-family="Arial">local bare remote</text>
  <rect x="670" y="90" width="180" height="115" rx="14" fill="#dcfce7" stroke="#22c55e"/><text x="760" y="128" text-anchor="middle" font-size="20" font-family="Arial">colleague</text><text x="760" y="158" text-anchor="middle" font-size="15" font-family="Arial">clone and push</text>
  <line x1="250" y1="147" x2="360" y2="147" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="550" y1="147" x2="660" y2="147" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="250" y="250" width="420" height="60" rx="14" fill="#ede9fe" stroke="#8b5cf6"/><text x="460" y="286" text-anchor="middle" font-size="18" font-family="Arial">reports: transcript + Markdown + observations.json</text>
  <text x="460" y="335" text-anchor="middle" font-size="16" font-family="Arial" fill="#334155">lab 把状态、对象、分支、diff、冲突、rebase、remote、tag 串成一个闭环</text>
</svg>
