<svg xmlns="http://www.w3.org/2000/svg" width="920" height="270" viewBox="0 0 920 270" role="img" aria-label="目录穿越与路径边界校验">
  <rect width="920" height="270" fill="#f8fafc"/>
  <defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/></marker><marker id="r" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#dc2626"/></marker></defs>
  <rect x="40" y="80" width="170" height="85" rx="14" fill="#dbeafe" stroke="#2563eb"/><text x="125" y="112" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#1e3a8a">用户输入</text><text x="125" y="138" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#1e3a8a">../secret.txt</text>
  <rect x="285" y="35" width="230" height="95" rx="14" fill="#fee2e2" stroke="#dc2626"/><text x="400" y="68" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#7f1d1d">unsafe: 直接拼接</text><text x="400" y="95" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#7f1d1d">www/../secret.txt</text>
  <rect x="285" y="155" width="230" height="85" rx="14" fill="#dcfce7" stroke="#16a34a"/><text x="400" y="187" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#14532d">safe: resolve + 边界</text><text x="400" y="214" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#14532d">target is_relative_to(root)</text>
  <rect x="620" y="45" width="230" height="170" rx="16" fill="#ffffff" stroke="#64748b" stroke-dasharray="6 5"/><text x="735" y="73" text-anchor="middle" font-size="15" font-family="sans-serif" fill="#334155">文件系统边界</text><rect x="650" y="95" width="160" height="40" rx="10" fill="#fef9c3" stroke="#ca8a04"/><text x="730" y="120" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#713f12">www/index.txt</text><rect x="650" y="155" width="160" height="40" rx="10" fill="#fee2e2" stroke="#dc2626"/><text x="730" y="180" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#7f1d1d">../secret.txt</text>
  <line x1="210" y1="112" x2="285" y2="82" stroke="#dc2626" stroke-width="3" marker-end="url(#r)"/><line x1="515" y1="82" x2="650" y2="175" stroke="#dc2626" stroke-width="3" marker-end="url(#r)"/><text x="530" y="126" font-size="12" font-family="sans-serif" fill="#7f1d1d">越界读取</text>
  <line x1="210" y1="140" x2="285" y2="198" stroke="#2563eb" stroke-width="3" marker-end="url(#a)"/><line x1="515" y1="198" x2="620" y2="198" stroke="#16a34a" stroke-width="3" marker-end="url(#a)"/><text x="535" y="218" font-size="12" font-family="sans-serif" fill="#14532d">越界则 403</text>
