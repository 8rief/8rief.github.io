<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
<title id="title">Warnings and build types</title>
<desc id="desc">A four-step debugging and build tooling diagram for Warnings and build types.</desc>
<rect width="960" height="360" fill="#f8fafc"/>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
<text x="40" y="48" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Warnings and build types</text>
<rect x="40" y="135" width="190" height="78" rx="16" fill="#e0f2fe" stroke="#334155" stroke-width="2"/>
<text x="135.0" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">source files</text>
<line x1="240" y1="174.0" x2="260" y2="174.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="270" y="135" width="190" height="78" rx="16" fill="#dcfce7" stroke="#334155" stroke-width="2"/>
<text x="365.0" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">compiler warnings</text>
<line x1="470" y1="174.0" x2="490" y2="174.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="500" y="135" width="190" height="78" rx="16" fill="#fef3c7" stroke="#334155" stroke-width="2"/>
<text x="595.0" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">Debug /</text>
<text x="595.0" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">Release</text>
<line x1="700" y1="174.0" x2="720" y2="174.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="730" y="135" width="190" height="78" rx="16" fill="#ede9fe" stroke="#334155" stroke-width="2"/>
<text x="825.0" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#0f172a">compile database</text>
<text x="40" y="315" font-family="Arial, sans-serif" font-size="14" fill="#475569">需求 → 命令 → 证据 → 边界：调试文章只保留能复跑和能解释问题的状态。</text>
