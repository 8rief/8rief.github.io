<svg xmlns="http://www.w3.org/2000/svg" width="920" height="240" viewBox="0 0 920 240" role="img" aria-label="li chao tree">
<rect width="920" height="240" fill="#f8fafc"/>
<defs><marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#334155"/></marker></defs>
<rect x="35" y="78" width="160" height="86" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="115" y="111" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#0f172a">加入直线</text>
<text x="115" y="137" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#334155">y=mx+b</text>
<line x1="195" y1="121.0" x2="222" y2="121.0" stroke="#334155" stroke-width="2.3" marker-end="url(#a)"/>
<rect x="240" y="78" width="160" height="86" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="320" y="111" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#0f172a">中点比较</text>
<text x="320" y="137" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#334155">保留更优线</text>
<line x1="400" y1="121.0" x2="427" y2="121.0" stroke="#334155" stroke-width="2.3" marker-end="url(#a)"/>
<rect x="445" y="78" width="160" height="86" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="525" y="111" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#0f172a">递归半区间</text>
<text x="525" y="137" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#334155">另一线继续</text>
<line x1="605" y1="121.0" x2="632" y2="121.0" stroke="#334155" stroke-width="2.3" marker-end="url(#a)"/>
<rect x="650" y="78" width="175" height="86" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="738" y="111" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#0f172a">单点查询</text>
<text x="738" y="137" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#334155">路径取最小</text>
</svg>