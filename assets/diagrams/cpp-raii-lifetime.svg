<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="390" viewBox="0 0 1060 390" role="img" aria-labelledby="title desc">
  <title id="title">RAII resource lifetime</title>
  <desc id="desc">A manual file descriptor path leaks when an early return skips close. A RAII wrapper acquires in the constructor, owns the descriptor during scope, and releases it in the destructor on normal return or exception. Local objects are destroyed in reverse construction order.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 10; }
      .good { fill: #ecfdf5; stroke: #059669; stroke-width: 1.6; rx: 10; }
      .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.6; rx: 10; }
      .bad { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.6; rx: 10; }
      .text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; font-size: 15px; fill: #0f172a; }
      .small { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; font-size: 12px; fill: #475569; }
      .cmd { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.2; fill: none; stroke-dasharray: 5 4; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="30" y="32" class="text">手动路径：控制流绕过 close，资源留在进程里</text>
  <rect x="45" y="62" width="150" height="65" class="box" />
  <text x="120" y="88" text-anchor="middle" class="cmd">open()</text>
  <text x="120" y="111" text-anchor="middle" class="small">获得 fd</text>

  <rect x="265" y="62" width="160" height="65" class="warn" />
  <text x="345" y="88" text-anchor="middle" class="cmd">write()</text>
  <text x="345" y="111" text-anchor="middle" class="small">使用资源</text>

  <rect x="495" y="62" width="160" height="65" class="bad" />
  <text x="575" y="88" text-anchor="middle" class="cmd">return / throw</text>
  <text x="575" y="111" text-anchor="middle" class="small">跳过 close</text>

  <rect x="725" y="62" width="180" height="65" class="bad" />
  <text x="815" y="88" text-anchor="middle" class="text">fd leak</text>
  <text x="815" y="111" text-anchor="middle" class="small">进程内描述符计数增长</text>

  <line x1="195" y1="95" x2="265" y2="95" class="arrow" />
  <line x1="425" y1="95" x2="495" y2="95" class="arrow" />
  <line x1="655" y1="95" x2="725" y2="95" class="arrow" />
  <line x1="575" y1="127" x2="575" y2="155" class="dash" />
  <text x="592" y="150" class="small">close 没执行</text>

  <text x="30" y="205" class="text">RAII 路径：对象生命周期绑定资源生命周期</text>
  <rect x="45" y="235" width="170" height="70" class="good" />
  <text x="130" y="262" text-anchor="middle" class="cmd">unique_fd ctor</text>
  <text x="130" y="286" text-anchor="middle" class="small">构造时接管 fd</text>

  <rect x="285" y="235" width="170" height="70" class="box" />
  <text x="370" y="262" text-anchor="middle" class="cmd">scope body</text>
  <text x="370" y="286" text-anchor="middle" class="small">正常使用资源</text>

  <rect x="525" y="220" width="180" height="55" class="warn" />
  <text x="615" y="242" text-anchor="middle" class="cmd">normal return</text>
  <text x="615" y="260" text-anchor="middle" class="small">离开作用域</text>

  <rect x="525" y="295" width="180" height="55" class="warn" />
  <text x="615" y="317" text-anchor="middle" class="cmd">exception</text>
  <text x="615" y="335" text-anchor="middle" class="small">栈展开离开作用域</text>

  <rect x="775" y="250" width="185" height="70" class="good" />
  <text x="867" y="277" text-anchor="middle" class="cmd">~unique_fd()</text>
  <text x="867" y="301" text-anchor="middle" class="small">析构时 close(fd)</text>

  <line x1="215" y1="270" x2="285" y2="270" class="arrow" />
  <line x1="455" y1="260" x2="525" y2="248" class="arrow" />
  <line x1="455" y1="282" x2="525" y2="322" class="arrow" />
  <line x1="705" y1="248" x2="775" y2="278" class="arrow" />
  <line x1="705" y1="322" x2="775" y2="302" class="arrow" />

  <rect x="55" y="330" width="390" height="45" class="box" />
  <text x="250" y="349" text-anchor="middle" class="small">同一作用域内：construct first → second → third</text>
  <text x="250" y="367" text-anchor="middle" class="small">离开作用域：destruct third → second → first</text>
</svg>
