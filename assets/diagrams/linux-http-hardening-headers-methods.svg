<rect width="940" height="430" fill="#f8fafc"/>
<text x="40" y="44" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">HTTP 加固检查链</text>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
<line x1="180" y1="175.0" x2="220" y2="175.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="360" y1="175.0" x2="400" y2="175.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="570" y1="175.0" x2="610" y2="175.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="780" y1="175.0" x2="390" y2="315.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="50" y="140" width="130" height="70" rx="14" fill="#dbeafe" stroke="#334155" stroke-width="1.5"/>
