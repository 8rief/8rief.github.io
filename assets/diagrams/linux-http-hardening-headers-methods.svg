<text x="290.0" y="187.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">GET/HEAD</text>
<rect x="400" y="140" width="170" height="70" rx="14" fill="#ffedd5" stroke="#334155" stroke-width="1.5"/>
<text x="485.0" y="165.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">headers</text>
<text x="485.0" y="187.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">nosniff/no-store</text>
