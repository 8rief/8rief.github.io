<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">文件描述符、重定向和管道模型</title>
  <desc id="desc">进程的 0、1、2 文件描述符连接输入、输出、错误和管道。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f766e"/></marker></defs>
  <rect x="20" y="20" width="880" height="320" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="340" y="80" width="240" height="150" rx="16" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="460" y="112" text-anchor="middle" font-size="20" font-family="Arial">进程文件描述符表</text>
  <text x="460" y="145" text-anchor="middle" font-size="16" font-family="Arial">0 stdin</text>
  <text x="460" y="170" text-anchor="middle" font-size="16" font-family="Arial">1 stdout</text>
  <text x="460" y="195" text-anchor="middle" font-size="16" font-family="Arial">2 stderr</text>
  <rect x="80" y="105" width="150" height="70" rx="12" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="155" y="147" text-anchor="middle" font-size="18" font-family="Arial">键盘/文件</text>
  <rect x="700" y="70" width="150" height="70" rx="12" fill="#dcfce7" stroke="#22c55e"/>
  <text x="775" y="112" text-anchor="middle" font-size="18" font-family="Arial">stdout 文件</text>
  <rect x="700" y="180" width="150" height="70" rx="12" fill="#fee2e2" stroke="#ef4444"/>
  <text x="775" y="222" text-anchor="middle" font-size="18" font-family="Arial">stderr 文件</text>
  <line x1="230" y1="140" x2="330" y2="140" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="580" y1="170" x2="690" y2="105" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="580" y1="195" x2="690" y2="215" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="460" y="285" text-anchor="middle" font-size="17" font-family="Arial" fill="#334155">shell 在 exec 前调整描述符：&gt; 改 1，2&gt; 改 2，| 连接上游 1 到下游 0</text>
</svg>
