<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">文本处理流水线模型</title>
  <desc id="desc">日志经过 grep 过滤、awk 投影、sort 排序、uniq 聚合，生成统计报告。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f766e"/></marker></defs>
  <rect x="20" y="20" width="880" height="320" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <g font-family="Arial" font-size="18" text-anchor="middle">
    <rect x="50" y="120" width="120" height="80" rx="12" fill="#fef3c7" stroke="#f59e0b"/><text x="110" y="166">log</text>
    <rect x="230" y="120" width="120" height="80" rx="12" fill="#dbeafe" stroke="#60a5fa"/><text x="290" y="166">grep</text>
    <rect x="410" y="120" width="120" height="80" rx="12" fill="#ede9fe" stroke="#8b5cf6"/><text x="470" y="166">awk</text>
    <rect x="590" y="120" width="120" height="80" rx="12" fill="#dcfce7" stroke="#22c55e"/><text x="650" y="166">sort</text>
    <rect x="770" y="120" width="120" height="80" rx="12" fill="#fee2e2" stroke="#ef4444"/><text x="830" y="156">uniq</text><text x="830" y="180">-c</text>
  </g>
  <line x1="170" y1="160" x2="220" y2="160" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="350" y1="160" x2="400" y2="160" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="530" y1="160" x2="580" y2="160" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="710" y1="160" x2="760" y2="160" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="460" y="275" text-anchor="middle" font-size="17" font-family="Arial" fill="#334155">每一步只做一件事，中间结果可单独检查</text>
</svg>
