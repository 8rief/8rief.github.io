<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360">
  <rect width="920" height="360" fill="#f8fafc"/>
  <text x="40" y="52" font-size="28" font-weight="700" style="font-family: Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;">Frobenius 共轭元与极小多项式</text>
  <circle cx="210" cy="180" r="56" fill="#dbeafe" stroke="#2563eb"/>
  <circle cx="410" cy="180" r="56" fill="#dbeafe" stroke="#2563eb"/>
  <circle cx="610" cy="180" r="56" fill="#dbeafe" stroke="#2563eb"/>
  <text x="193" y="187" font-size="22" style="font-family: Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;">α</text>
  <text x="389" y="187" font-size="22" style="font-family: Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;">α^q</text>
  <text x="584" y="187" font-size="22" style="font-family: Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;">α^(q²)</text>
  <path d="M266 180 H350" stroke="#334155" stroke-width="3" marker-end="url(#a)"/>
  <path d="M466 180 H550" stroke="#334155" stroke-width="3" marker-end="url(#a)"/>
  <path d="M666 180 C760 180 760 70 230 88" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#a)"/>
  <rect x="120" y="270" width="680" height="54" rx="14" fill="#fff" stroke="#94a3b8"/>
  <text x="160" y="304" font-size="19" style="font-family: Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;">m_α(x)=∏(x-α^(q^i))，整个乘积被 Frobenius 固定，所以系数落回 F_q</text>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
</svg>