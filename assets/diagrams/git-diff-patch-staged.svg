<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Git diff 和 patch 边界模型</title>
  <desc id="desc">git diff 比较 working tree 和 index，git diff --staged 比较 index 和 HEAD。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0f766e"/></marker></defs>
  <rect x="20" y="20" width="880" height="320" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="80" y="90" width="190" height="110" rx="14" fill="#dbeafe" stroke="#60a5fa"/><text x="175" y="132" text-anchor="middle" font-size="20" font-family="Arial">working tree</text>
  <rect x="365" y="90" width="190" height="110" rx="14" fill="#dcfce7" stroke="#22c55e"/><text x="460" y="132" text-anchor="middle" font-size="20" font-family="Arial">index</text>
  <rect x="650" y="90" width="190" height="110" rx="14" fill="#fef3c7" stroke="#f59e0b"/><text x="745" y="132" text-anchor="middle" font-size="20" font-family="Arial">HEAD</text>
  <line x1="270" y1="145" x2="355" y2="145" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><text x="312" y="126" text-anchor="middle" font-size="15" font-family="Arial">git add</text>
  <line x1="555" y1="145" x2="640" y2="145" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><text x="598" y="126" text-anchor="middle" font-size="15" font-family="Arial">commit</text>
  <text x="318" y="230" text-anchor="middle" font-size="16" font-family="Arial" fill="#0f766e">git diff</text>
  <text x="603" y="230" text-anchor="middle" font-size="16" font-family="Arial" fill="#0f766e">git diff --staged</text>
  <text x="460" y="295" text-anchor="middle" font-size="17" font-family="Arial" fill="#334155">提交前同时看未暂存和已暂存变化，确认 patch 边界</text>
</svg>
