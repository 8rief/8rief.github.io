<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Git merge conflict 解决模型</title>
  <desc id="desc">共同祖先分出两条修改同一行的分支，merge 后进入冲突文件，编辑解决后提交。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/></marker></defs>
  <rect x="20" y="20" width="880" height="320" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <circle cx="170" cy="180" r="28" fill="#dbeafe" stroke="#60a5fa"/><text x="170" y="186" text-anchor="middle" font-size="16" font-family="Arial">base</text>
  <circle cx="360" cy="115" r="28" fill="#dcfce7" stroke="#22c55e"/><text x="360" y="121" text-anchor="middle" font-size="16" font-family="Arial">ready</text>
  <circle cx="360" cy="245" r="28" fill="#fef3c7" stroke="#f59e0b"/><text x="360" y="251" text-anchor="middle" font-size="16" font-family="Arial">review</text>
  <rect x="540" y="95" width="230" height="170" rx="14" fill="#fee2e2" stroke="#ef4444"/>
  <text x="655" y="132" text-anchor="middle" font-size="20" font-family="Arial">conflict file</text>
  <text x="655" y="165" text-anchor="middle" font-size="15" font-family="Arial">&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</text>
  <text x="655" y="190" text-anchor="middle" font-size="15" font-family="Arial">=======</text>
  <text x="655" y="215" text-anchor="middle" font-size="15" font-family="Arial">&gt;&gt;&gt;&gt;&gt;&gt;&gt; feature</text>
  <line x1="198" y1="170" x2="332" y2="125" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="198" y1="190" x2="332" y2="235" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="388" y1="125" x2="530" y2="160" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="388" y1="235" x2="530" y2="200" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="460" y="305" text-anchor="middle" font-size="17" font-family="Arial" fill="#334155">解决冲突 = 编辑最终文件内容 → git add → git commit</text>
</svg>
