<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430" role="img" aria-labelledby="title desc">
<title id="title">Loopback 监听与 curl 连接</title>
<desc id="desc">Loopback 监听与 curl 连接 的结构示意图。</desc>
<rect width="940" height="430" fill="#f8fafc"/>
<text x="40" y="44" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">Loopback 监听与 curl 连接</text>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
<line x1="230" y1="185.0" x2="300" y2="125.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="450" y1="255.0" x2="80" y2="185.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="230" y1="185.0" x2="570" y2="185.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="80" y="150" width="150" height="70" rx="14" fill="#dcfce7" stroke="#334155" stroke-width="1.5"/>
<text x="155.0" y="175.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">server</text>
<text x="155.0" y="197.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">LISTEN</text>
<rect x="300" y="90" width="150" height="70" rx="14" fill="#dbeafe" stroke="#334155" stroke-width="1.5"/>
<text x="375.0" y="115.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">ss -ltn</text>
<text x="375.0" y="137.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">system view</text>
<rect x="300" y="220" width="150" height="70" rx="14" fill="#ffedd5" stroke="#334155" stroke-width="1.5"/>
<text x="375.0" y="245.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">curl -v</text>
<text x="375.0" y="267.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">client view</text>
<rect x="570" y="150" width="170" height="70" rx="14" fill="#ede9fe" stroke="#334155" stroke-width="1.5"/>
<text x="655.0" y="175.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">HTTP 200</text>
<text x="655.0" y="197.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">headers/body</text>
