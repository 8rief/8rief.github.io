<svg xmlns="http://www.w3.org/2000/svg" width="940" height="360" viewBox="0 0 940 360">
  <rect width="940" height="360" fill="#f8fafc"/>
  <text x="42" y="54" font-size="28" font-weight="700" style="font-family: Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;">相关函数：用移位内积衡量相似度</text>
  <rect x="105" y="105" width="730" height="54" rx="12" fill="#dbeafe" stroke="#2563eb"/>
  <text x="135" y="140" font-size="18" style="font-family: Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;">序列 A：+1  +1  -1  +1  -1  -1  -1</text>
  <rect x="105" y="185" width="730" height="54" rx="12" fill="#dcfce7" stroke="#16a34a"/>
  <text x="135" y="220" font-size="18" style="font-family: Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;">移位 B：+1  -1  +1  -1  -1  -1  +1</text>
  <path d="M470 162 V181" stroke="#334155" stroke-width="3" marker-end="url(#a)"/>
  <rect x="210" y="278" width="520" height="46" rx="14" fill="#fff" stroke="#94a3b8"/>
  <text x="250" y="308" font-size="18" style="font-family: Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;">逐项相乘再求和；m 序列非零自相关为 -1</text>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
