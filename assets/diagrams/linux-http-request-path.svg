<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">HTTP request bytes from curl to local server</title>
  <desc id="desc">curl converts URL and headers into HTTP request bytes. A local server receives request line, headers, CRLF separator, and sends status line, headers, body.</desc>
  <defs><style>text{font-family:Arial,'Microsoft YaHei',sans-serif;fill:#172033}.box{fill:#f6f8fb;stroke:#315c9f;stroke-width:2;rx:16}.wire{fill:#e8f0fe;stroke:#1a73e8;stroke-width:2;rx:16}.resp{fill:#edf8f0;stroke:#2f855a;stroke-width:2;rx:16}.arrow{stroke:#44546a;stroke-width:2.5;marker-end:url(#arrow);fill:none}.title{font-size:22px;font-weight:700}.small{font-size:17px}.mono{font-family:Consolas,'Courier New',monospace;font-size:16px}</style><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 z" fill="#44546a"/></marker></defs>
  <text x="490" y="40" text-anchor="middle" class="title">HTTP/1.1 请求从命令变成字节</text>
  <rect x="55" y="85" width="190" height="110" class="box"/><text x="150" y="124" text-anchor="middle" class="title">curl -v</text><text x="150" y="157" text-anchor="middle" class="small">URL + headers</text>
  <rect x="315" y="65" width="350" height="150" class="wire"/><text x="490" y="97" text-anchor="middle" class="title">请求字节</text><text x="340" y="130" class="mono">GET /alpha?x=1 HTTP/1.1</text><text x="340" y="157" class="mono">Host: 127.0.0.1:18181</text><text x="340" y="184" class="mono">X-Lab: curl-path</text><text x="340" y="211" class="mono">CRLF CRLF</text>
  <rect x="740" y="85" width="190" height="110" class="box"/><text x="835" y="124" text-anchor="middle" class="title">本地服务</text><text x="835" y="157" text-anchor="middle" class="small">recv()</text>
  <path d="M245 140 L315 140" class="arrow"/><path d="M665 140 L740 140" class="arrow"/>
  <rect x="215" y="285" width="550" height="90" class="resp"/><text x="490" y="318" text-anchor="middle" class="title">响应</text><text x="490" y="348" text-anchor="middle" class="mono">HTTP/1.1 200 OK + Content-Length + body</text>
  <path d="M835 195 C790 260 720 300 765 330" class="arrow"/><path d="M215 330 C150 300 120 230 150 195" class="arrow"/>
</svg>
