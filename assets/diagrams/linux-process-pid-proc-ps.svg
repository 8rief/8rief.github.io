<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">程序文件到 Linux 进程模型</title>
  <desc id="desc">shell 创建子进程，子进程 exec 程序，父进程 wait 读取状态。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/></marker></defs>
  <rect x="20" y="20" width="880" height="320" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="70" y="95" width="170" height="100" rx="14" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="155" y="132" text-anchor="middle" font-size="20" font-family="Arial">shell</text>
  <text x="155" y="162" text-anchor="middle" font-size="15" font-family="Arial">fork 子进程</text>
  <rect x="330" y="95" width="190" height="100" rx="14" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="425" y="132" text-anchor="middle" font-size="20" font-family="Arial">子进程</text>
  <text x="425" y="162" text-anchor="middle" font-size="15" font-family="Arial">PID / PPID / fd / env</text>
  <rect x="620" y="75" width="220" height="140" rx="14" fill="#dcfce7" stroke="#22c55e"/>
  <text x="730" y="112" text-anchor="middle" font-size="20" font-family="Arial">exec 后的程序</text>
  <text x="730" y="145" text-anchor="middle" font-size="15" font-family="Arial">/proc/&lt;pid&gt;/status</text>
  <text x="730" y="170" text-anchor="middle" font-size="15" font-family="Arial">ps 整理内核视图</text>
  <line x1="240" y1="145" x2="320" y2="145" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="520" y1="145" x2="610" y2="145" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M620 225 C500 290,300 290,180 205" fill="none" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="460" y="305" text-anchor="middle" font-size="17" font-family="Arial" fill="#334155">父进程 wait 子进程结束并读取退出状态</text>
</svg>
