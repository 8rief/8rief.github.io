<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
<title id="title">矩阵乘法到 logits</title>
<desc id="desc">矩阵乘法到 logits 的结构示意图。</desc>
<rect width="920" height="420" fill="#f8fafc"/>
<text x="40" y="42" font-size="24" font-family="Arial, sans-serif" fill="#0f172a">矩阵乘法到 logits</text>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs>
<line x1="210" y1="195.0" x2="280" y2="195.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="410" y1="195.0" x2="480" y2="195.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="620" y1="195.0" x2="700" y2="195.0" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="80" y="160" width="130" height="70" rx="14" fill="#dbeafe" stroke="#334155" stroke-width="1.5"/>
<text x="145.0" y="185.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">X</text>
<text x="145.0" y="207.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">n × d</text>
<rect x="280" y="160" width="130" height="70" rx="14" fill="#dcfce7" stroke="#334155" stroke-width="1.5"/>
<text x="345.0" y="185.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">W</text>
<text x="345.0" y="207.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">d × 1</text>
<rect x="480" y="160" width="140" height="70" rx="14" fill="#ffedd5" stroke="#334155" stroke-width="1.5"/>
<text x="550.0" y="185.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">XW + b</text>
<text x="550.0" y="207.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">affine</text>
<rect x="700" y="160" width="120" height="70" rx="14" fill="#ede9fe" stroke="#334155" stroke-width="1.5"/>
<text x="760.0" y="185.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">logits</text>
<text x="760.0" y="207.0" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#0f172a">n</text>
</svg>