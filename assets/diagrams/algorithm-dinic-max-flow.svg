<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-label="Dinic max flow diagram">
<rect width="920" height="260" fill="#f8fafc"/>
<defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#334155"/></marker></defs>
<rect x="35" y="80" width="155" height="86" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
<text x="112" y="114" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#0f172a">残量网络</text>
<text x="112" y="140" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#334155">可撤销流量</text>
<line x1="190" y1="123.0" x2="217" y2="123.0" stroke="#334155" stroke-width="2.3" marker-end="url(#arrow)"/>
<rect x="235" y="80" width="155" height="86" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="312" y="114" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#0f172a">BFS 层次</text>
<text x="312" y="140" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#334155">只走增层边</text>
<line x1="390" y1="123.0" x2="417" y2="123.0" stroke="#334155" stroke-width="2.3" marker-end="url(#arrow)"/>
<rect x="435" y="80" width="155" height="86" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="512" y="114" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#0f172a">DFS 增广</text>
<text x="512" y="140" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#334155">阻塞流</text>
<line x1="590" y1="123.0" x2="617" y2="123.0" stroke="#334155" stroke-width="2.3" marker-end="url(#arrow)"/>
<rect x="635" y="80" width="175" height="86" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="722" y="114" text-anchor="middle" font-size="17" font-family="sans-serif" fill="#0f172a">无 s-t 路</text>
<text x="722" y="140" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#334155">得到最大流</text>
</svg>