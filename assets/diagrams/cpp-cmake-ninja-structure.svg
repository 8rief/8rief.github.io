<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">CMake and Ninja build graph</title>
  <desc id="desc">The source tree contains CMakeLists files, include headers, library source, app source, and tests. CMake configures and generates a build tree containing CMakeCache, compile_commands, and build.ninja. Ninja builds library and executable targets. The qcalc library publishes include directories and C++20 compile features to app and test targets.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; font-size: 14px; fill: #0f172a; }
      .small { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; font-size: 12px; fill: #475569; }
      .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; fill: #1e293b; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 10; }
      .source { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.6; rx: 10; }
      .build { fill: #ecfdf5; stroke: #059669; stroke-width: 1.6; rx: 10; }
      .target { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.6; rx: 10; }
      .test { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.6; rx: 10; }
      .arrow { stroke: #334155; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .public { stroke: #059669; stroke-width: 1.8; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrow); }
      .link { stroke: #ea580c; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="34" y="36" class="title">CMake 描述 target 边界，Ninja 执行生成后的构建图</text>

  <rect x="40" y="70" width="250" height="365" class="source" />
  <text x="165" y="98" text-anchor="middle" class="title">source tree</text>
  <rect x="65" y="125" width="200" height="42" class="box" />
  <text x="165" y="151" text-anchor="middle" class="code">CMakeLists.txt</text>
  <rect x="65" y="180" width="200" height="42" class="box" />
  <text x="165" y="206" text-anchor="middle" class="code">include/qcalc/*.hpp</text>
  <rect x="65" y="235" width="200" height="42" class="box" />
  <text x="165" y="261" text-anchor="middle" class="code">src/calculator.cpp</text>
  <rect x="65" y="290" width="200" height="42" class="box" />
  <text x="165" y="316" text-anchor="middle" class="code">app/main.cpp</text>
  <rect x="65" y="345" width="200" height="42" class="box" />
  <text x="165" y="371" text-anchor="middle" class="code">tests/*_tests.cpp</text>

  <rect x="370" y="92" width="215" height="120" class="build" />
  <text x="477" y="124" text-anchor="middle" class="title">configure / generate</text>
  <text x="477" y="154" text-anchor="middle" class="code">cmake -S . -B build/ninja</text>
  <text x="477" y="181" text-anchor="middle" class="small">选择生成器、编译器、构建类型</text>

  <rect x="370" y="260" width="215" height="150" class="build" />
  <text x="477" y="292" text-anchor="middle" class="title">build tree</text>
  <text x="477" y="324" text-anchor="middle" class="code">CMakeCache.txt</text>
  <text x="477" y="350" text-anchor="middle" class="code">compile_commands.json</text>
  <text x="477" y="376" text-anchor="middle" class="code">build.ninja</text>

  <line x1="290" y1="150" x2="370" y2="150" class="arrow" />
  <line x1="477" y1="212" x2="477" y2="260" class="arrow" />

  <rect x="675" y="95" width="190" height="82" class="target" />
  <text x="770" y="125" text-anchor="middle" class="code">qcalc library</text>
  <text x="770" y="149" text-anchor="middle" class="small">PUBLIC include/ + C++20</text>

  <rect x="675" y="245" width="190" height="72" class="target" />
  <text x="770" y="276" text-anchor="middle" class="code">qcalc_cli</text>
  <text x="770" y="298" text-anchor="middle" class="small">可执行入口</text>

  <rect x="675" y="365" width="190" height="72" class="test" />
  <text x="770" y="396" text-anchor="middle" class="code">qcalc_tests</text>
  <text x="770" y="418" text-anchor="middle" class="small">CTest 测试入口</text>

  <line x1="585" y1="335" x2="675" y2="136" class="arrow" />
  <line x1="865" y1="136" x2="965" y2="280" class="public" />
  <line x1="865" y1="136" x2="965" y2="400" class="public" />
  <text x="918" y="214" text-anchor="middle" class="small">使用需求传播</text>

  <rect x="965" y="245" width="165" height="72" class="target" />
  <text x="1048" y="276" text-anchor="middle" class="code">app/qcalc_cli</text>
  <text x="1048" y="298" text-anchor="middle" class="small">链接 qcalc</text>

  <rect x="965" y="365" width="165" height="72" class="test" />
  <text x="1048" y="396" text-anchor="middle" class="code">tests/qcalc_tests</text>
  <text x="1048" y="418" text-anchor="middle" class="small">链接 qcalc</text>

  <line x1="865" y1="281" x2="965" y2="281" class="link" />
  <line x1="865" y1="401" x2="965" y2="401" class="link" />

  <rect x="370" y="455" width="760" height="55" class="box" />
  <text x="750" y="477" text-anchor="middle" class="small">增量构建：改 app/main.cpp 只重建 app；改 src/calculator.cpp 会重建库并重新链接 app/tests</text>
  <text x="750" y="497" text-anchor="middle" class="small">漏掉 target_link_libraries 时，头文件可编译通过，但链接阶段出现 undefined reference</text>
</svg>
