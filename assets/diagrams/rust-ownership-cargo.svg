<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">Rust ownership borrowing and Cargo workflow</title>
  <desc id="desc">A Rust value has one owner. Immutable references borrow read access, mutable references borrow exclusive write access, and move transfers ownership. Cargo coordinates formatting, checking, testing, running, and documentation generation.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155" /></marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .small { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; font-size: 12px; fill: #475569; }
      .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; fill: #1e293b; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.4; rx: 10; }
      .owner { fill: #ecfdf5; stroke: #059669; stroke-width: 1.6; rx: 10; }
      .borrow { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.6; rx: 10; }
      .mut { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.6; rx: 10; }
      .cargo { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.6; rx: 10; }
      .bad { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.6; rx: 10; }
      .arrow { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.3; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="34" y="38" class="title">Rust：所有权由类型系统表达，Cargo 把检查组织成工作流</text>

  <rect x="55" y="80" width="210" height="80" class="owner" />
  <text x="160" y="110" text-anchor="middle" class="code">Document owner</text>
  <text x="160" y="134" text-anchor="middle" class="small">value lives until owner drops</text>

  <rect x="355" y="80" width="190" height="80" class="borrow" />
  <text x="450" y="110" text-anchor="middle" class="code">&amp;Document</text>
  <text x="450" y="134" text-anchor="middle" class="small">read borrow, no ownership</text>

  <rect x="635" y="80" width="190" height="80" class="mut" />
  <text x="730" y="110" text-anchor="middle" class="code">&amp;mut Document</text>
  <text x="730" y="134" text-anchor="middle" class="small">exclusive write borrow</text>

  <rect x="915" y="80" width="190" height="80" class="owner" />
  <text x="1010" y="110" text-anchor="middle" class="code">consume(doc)</text>
  <text x="1010" y="134" text-anchor="middle" class="small">move transfers owner</text>

  <line x1="265" y1="120" x2="355" y2="120" class="dash" />
  <line x1="545" y1="120" x2="635" y2="120" class="dash" />
  <line x1="825" y1="120" x2="915" y2="120" class="arrow" />

  <rect x="95" y="220" width="260" height="82" class="bad" />
  <text x="225" y="250" text-anchor="middle" class="code">E0382</text>
  <text x="225" y="274" text-anchor="middle" class="small">use after move</text>

  <rect x="460" y="220" width="260" height="82" class="bad" />
  <text x="590" y="250" text-anchor="middle" class="code">E0499</text>
  <text x="590" y="274" text-anchor="middle" class="small">two mutable borrows</text>

  <rect x="825" y="220" width="260" height="82" class="bad" />
  <text x="955" y="250" text-anchor="middle" class="code">E0106 / lifetime</text>
  <text x="955" y="274" text-anchor="middle" class="small">borrow has no valid source</text>

  <rect x="70" y="385" width="180" height="76" class="cargo" />
  <text x="160" y="414" text-anchor="middle" class="code">cargo fmt</text>
  <text x="160" y="438" text-anchor="middle" class="small">format gate</text>

  <rect x="285" y="385" width="180" height="76" class="cargo" />
  <text x="375" y="414" text-anchor="middle" class="code">cargo check</text>
  <text x="375" y="438" text-anchor="middle" class="small">type + borrow check</text>

  <rect x="500" y="385" width="180" height="76" class="cargo" />
  <text x="590" y="414" text-anchor="middle" class="code">cargo test</text>
  <text x="590" y="438" text-anchor="middle" class="small">unit + integration + doctest</text>

  <rect x="715" y="385" width="180" height="76" class="cargo" />
  <text x="805" y="414" text-anchor="middle" class="code">cargo run</text>
  <text x="805" y="438" text-anchor="middle" class="small">small executable demo</text>

  <rect x="930" y="385" width="180" height="76" class="cargo" />
  <text x="1020" y="414" text-anchor="middle" class="code">cargo doc</text>
  <text x="1020" y="438" text-anchor="middle" class="small">API docs + examples</text>

  <line x1="250" y1="423" x2="285" y2="423" class="arrow" />
  <line x1="465" y1="423" x2="500" y2="423" class="arrow" />
  <line x1="680" y1="423" x2="715" y2="423" class="arrow" />
  <line x1="895" y1="423" x2="930" y2="423" class="arrow" />

  <rect x="200" y="495" width="780" height="42" class="box" />
  <text x="590" y="521" text-anchor="middle" class="small">固定验证流：fmt --check → check --locked → test --locked → run --locked → doc --locked --no-deps</text>
</svg>
