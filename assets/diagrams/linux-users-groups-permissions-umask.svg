<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Linux 权限和 umask 模型</title>
  <desc id="desc">用户、用户组和 other 三组权限位，umask 屏蔽新文件默认权限。</desc>
  <rect x="20" y="20" width="880" height="320" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="80" y="80" width="220" height="140" rx="16" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="190" y="116" text-anchor="middle" font-size="20" font-family="Arial">进程凭据</text>
  <text x="190" y="150" text-anchor="middle" font-size="16" font-family="Arial">uid / gid / groups</text>
  <rect x="360" y="80" width="220" height="140" rx="16" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="470" y="116" text-anchor="middle" font-size="20" font-family="Arial">文件元数据</text>
  <text x="470" y="150" text-anchor="middle" font-size="16" font-family="Arial">owner / group</text>
  <text x="470" y="178" text-anchor="middle" font-size="16" font-family="Arial">rwx rwx rwx</text>
  <rect x="640" y="80" width="200" height="140" rx="16" fill="#dcfce7" stroke="#22c55e"/>
  <text x="740" y="116" text-anchor="middle" font-size="20" font-family="Arial">访问判断</text>
  <text x="740" y="150" text-anchor="middle" font-size="16" font-family="Arial">read / write / execute</text>
  <text x="740" y="178" text-anchor="middle" font-size="16" font-family="Arial">目录执行位可穿过</text>
  <line x1="300" y1="150" x2="360" y2="150" stroke="#334155" stroke-width="3"/>
  <line x1="580" y1="150" x2="640" y2="150" stroke="#334155" stroke-width="3"/>
  <text x="460" y="275" text-anchor="middle" font-size="17" font-family="Arial" fill="#334155">新文件：requested mode 666 与 umask 027 组合，得到 640</text>
</svg>
